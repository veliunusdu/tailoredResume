manual_ats:
  - "ibegin.tcsapps.com"       # TCS iBegin — unsolvable CAPTCHA every time

blocked:
  sites:
    - "glassdoor"
    - "google"
    - "accenture"
    - "AccentureCareers"
    - "Workopolis"
  url_patterns:
    - "%glassdoor%"
    - "%google.com/about/careers%"
    - "%google.jobs%"
    - "%accenture%"
    - "%workopolis.com/out%"

blocked_sso:
  - "accounts.google.com"
  - "login.microsoftonline.com"
  - "okta.com"
  - "auth0.com"
  - "sso.cisco.com"

