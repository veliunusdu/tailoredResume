version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ajas_user
      POSTGRES_PASSWORD: ajas_password
      POSTGRES_DB: ajas_db
    ports:
      - "5432:5432"

  app:
    build: .
    command: streamlit run src/ajas/app.py
    ports:
      - "8501:8501"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://ajas_user:ajas_password@db:5432/ajas_db
    depends_on:
      - redis
      - db
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env

  worker:
    build: .
    command: celery -A ajas.worker.app worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://ajas_user:ajas_password@db:5432/ajas_db
      - PYTHONPATH=/app/src
    depends_on:
      - redis
      - db
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
