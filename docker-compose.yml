services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - .env:/app/.env
    restart: always

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
      - redis
    restart: always

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    restart: always

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - ./data:/app/data
      - .env:/app/.env
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: always
